apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: archivepolicies.velocity.sh
spec:
  group: velocity.sh
  names:
    categories: []
    kind: ArchivePolicy
    plural: archivepolicies
    shortNames:
    - ap
    singular: archivepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ArchivePolicySpec via `CustomResource`
        properties:
          spec:
            properties:
              batchSize:
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              destination:
                properties:
                  backend:
                    type: string
                  bucket:
                    nullable: true
                    type: string
                  format:
                    nullable: true
                    type: string
                required:
                - backend
                type: object
              maxDuration:
                nullable: true
                type: string
              purgeAfter:
                nullable: true
                type: string
              schedule:
                type: string
              trigger:
                properties:
                  field:
                    nullable: true
                    type: string
                  maxExecutionMs:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  op:
                    nullable: true
                    type: string
                  rule:
                    nullable: true
                    type: string
                  type:
                    type: string
                  value:
                    x-kubernetes-preserve-unknown-fields: true
                required:
                - type
                type: object
            required:
            - destination
            - schedule
            - trigger
            type: object
          status:
            nullable: true
            properties:
              coldRoles:
                default: []
                description: |-
                  Postgres roles granted on the cold schema (reader/writer/admin).
                  Surfaced for operator visibility — the eventual archive worker
                  `SET LOCAL ROLE`s into the writer for inserts, mirroring ADR-007.
                items:
                  type: string
                type: array
              coldSchema:
                description: |-
                  Postgres schema name that will receive archived rows when the
                  policy's `destination.backend = postgres-cold`. Set by the
                  operator once the cold schema is provisioned; absent for s3
                  destinations or until the spec passes validation.
                nullable: true
                type: string
              conditions:
                default: []
                items:
                  description: Common condition shape reused in `*Status.conditions`.
                  properties:
                    lastTransitionTime:
                      nullable: true
                      type: string
                    message:
                      nullable: true
                      type: string
                    reason:
                      nullable: true
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              lastRunAt:
                nullable: true
                type: string
              phase:
                description: Phase reported by an operator-managed resource.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deprecated
                - Rebuilding
                nullable: true
                type: string
              recordsArchived:
                format: uint64
                minimum: 0.0
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: ArchivePolicy
        type: object
    served: true
    storage: true
    subresources:
      status: {}
