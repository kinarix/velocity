apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: authstrategies.velocity.sh
spec:
  group: velocity.sh
  names:
    categories: []
    kind: AuthStrategy
    plural: authstrategies
    shortNames:
    - auth
    singular: authstrategy
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for AuthStrategySpec via `CustomResource`
        properties:
          spec:
            properties:
              config:
                properties:
                  cel:
                    nullable: true
                    properties:
                      maxExecutionMs:
                        description: Cap on per-rule CEL execution (milliseconds). ADR — CEL safety.
                        format: uint32
                        minimum: 0.0
                        type: integer
                    required:
                    - maxExecutionMs
                    type: object
                  children:
                    default: []
                    description: |-
                      Ordered child strategy refs — only meaningful when [`AuthStrategySpec::kind`]
                      is [`AuthStrategyType::Composite`]. The middleware walks this list in
                      order, picks the first child whose credential scheme is present on
                      the request, and runs *that* child's verification. There is no
                      fall-through after a verification failure — JWT-fails-then-API-key
                      is read as "no `Bearer` header, `ApiKey` header present", not "try
                      JWT, then if it 401s try API key". (Defends against an attacker
                      trading off two schemes' error oracles.)
                    items:
                      description: Lightweight pointer to another CRD by name + namespace.
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    type: array
                  clockSkew:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  issuers:
                    default: []
                    items:
                      properties:
                        audience:
                          nullable: true
                          type: string
                        claims:
                          default:
                            actorId: null
                            attributes: {}
                            email: null
                            roles: null
                          description: |-
                            Claim mapping with optional JSONPath + transforms (see design §1.5).
                            We accept the right-hand side as a raw JSON value so transforms like
                            `{ path: "$.roles", transform: scope_to_roles }` round-trip losslessly.
                          properties:
                            actorId:
                              x-kubernetes-preserve-unknown-fields: true
                            attributes:
                              default: {}
                              x-kubernetes-preserve-unknown-fields: true
                            email:
                              x-kubernetes-preserve-unknown-fields: true
                            roles:
                              x-kubernetes-preserve-unknown-fields: true
                          type: object
                        issuer:
                          type: string
                        jwksUrl:
                          default: ''
                          description: |-
                            JWKS endpoint URL. Required for JWT strategies. For OIDC strategies
                            the API server fills this from the discovery document at strategy
                            load time when [`OidcConfig::config_url`] is set and this is empty,
                            so users with a discovery URL can omit it.
                          type: string
                      required:
                      - issuer
                      type: object
                    type: array
                  oidc:
                    description: |-
                      OIDC authorization-code flow configuration. Only meaningful when
                      [`AuthStrategySpec::kind`] is [`AuthStrategyType::Oidc`]. The
                      strategy still uses `issuers[].jwks_url` to verify the ID token's
                      signature; this block carries the client-side endpoints and
                      credentials needed to drive the redirect dance.
                    nullable: true
                    properties:
                      authorizationEndpoint:
                        default: ''
                        description: |-
                          IdP authorization endpoint — the user-agent is redirected here.
                          Required unless [`Self::config_url`] is set and discovery returns
                          an `authorization_endpoint`.
                        type: string
                      clientId:
                        description: OAuth2 client id registered with the IdP.
                        type: string
                      clientSecretRef:
                        description: |-
                          Reference to a Secret containing the OAuth2 client secret. The
                          operator reads it; the API server reads it via env at startup. The
                          CRD never carries the plaintext.
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      configUrl:
                        description: |-
                          OIDC discovery URL — usually `https://<idp>/.well-known/openid-configuration`.
                          When set, the API server fetches this document once at strategy
                          load time and uses it to populate any endpoint fields below (and
                          the matching `issuers[].jwks_url`) that you left unset. Explicit
                          values in the CRD always win. If discovery fails at load time and
                          any required endpoint is still unset, the strategy is rejected and
                          will not be registered — fail-closed.
                        nullable: true
                        type: string
                      issuer:
                        default: ''
                        description: |-
                          Issuer string expected on the ID token — must match one of
                          [`AuthStrategyConfig::issuers`]. Selects which JWKS to verify with.
                          May be populated from discovery's `issuer` claim when
                          [`Self::config_url`] is set.
                        type: string
                      redirectUri:
                        description: |-
                          Where the IdP must redirect after authorization — must exactly match
                          the value the IdP has registered for `client_id`.
                        type: string
                      scopes:
                        default: []
                        description: Scopes requested at authorization time. Always includes `openid`.
                        items:
                          type: string
                        type: array
                      sessionTtl:
                        description: Browser-session lifetime in seconds. Defaults to 8 hours.
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                      tokenEndpoint:
                        default: ''
                        description: |-
                          IdP token endpoint — back-channel exchange of the authorization
                          code. Required unless [`Self::config_url`] is set and discovery
                          returns a `token_endpoint`.
                        type: string
                      userinfoEndpoint:
                        description: |-
                          IdP userinfo endpoint — optional; when set, the callback fetches
                          additional claims after token exchange. The middleware merges them
                          over ID-token claims (later wins) before claim mapping runs. May
                          also be populated from discovery's `userinfo_endpoint`.
                        nullable: true
                        type: string
                    required:
                    - clientId
                    - clientSecretRef
                    - redirectUri
                    type: object
                  revocation:
                    nullable: true
                    properties:
                      backend:
                        type: string
                      failOpen:
                        default: false
                        description: ADR-003 — default false (deny on Redis failure).
                        type: boolean
                      key:
                        nullable: true
                        type: string
                      ttl:
                        format: uint32
                        minimum: 0.0
                        nullable: true
                        type: integer
                    required:
                    - backend
                    type: object
                  ttlMax:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
              type:
                enum:
                - jwt
                - oidc
                - apikey
                - composite
                - none
                type: string
            required:
            - config
            - type
            type: object
          status:
            nullable: true
            properties:
              conditions:
                default: []
                items:
                  description: Common condition shape reused in `*Status.conditions`.
                  properties:
                    lastTransitionTime:
                      nullable: true
                      type: string
                    message:
                      nullable: true
                      type: string
                    reason:
                      nullable: true
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              issuersResolved:
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              phase:
                description: Phase reported by an operator-managed resource.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deprecated
                - Rebuilding
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: AuthStrategy
        type: object
    served: true
    storage: true
    subresources:
      status: {}
