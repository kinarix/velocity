                          format: uint32
                          minimum: 0.0
                          nullable: true
                          type: integer
                        strategy:
                          enum:
                          - redact
                          - partial
                          - hash
                          type: string
                        unmaskedFor:
                          default: []
                          description: |-
                            Roles whose holders see the raw value. Empty list ⇒ everyone is
                            masked. The unmask check is OR across the caller's roles.
                          items:
                            type: string
                          type: array
