apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: applications.velocity.sh
spec:
  group: velocity.sh
  names:
    categories: []
    kind: Application
    plural: applications
    shortNames:
    - app
    singular: application
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ApplicationSpec via `CustomResource`
        properties:
          spec:
            properties:
              authStrategy:
                description: Lightweight pointer to another CRD by name + namespace.
                nullable: true
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                - namespace
                type: object
              databaseQuota:
                nullable: true
                properties:
                  coldTablespace:
                    description: Use cold-tier tablespace for the archive schema.
                    nullable: true
                    type: boolean
                  poolSize:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  readReplicas:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
              deployment:
                description: |-
                  Default data-API scope for domains in this application.
                  Domains may override with their own `spec.deployment.scope`.
                  Absent → `App` scope.
                nullable: true
                properties:
                  maxReplicas:
                    description: Maximum replicas (KEDA/HPA ceiling). Default 10.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  minReplicas:
                    description: |-
                      Minimum replicas (KEDA `minReplicaCount`). Default 1 — never
                      scale to zero, so a domain's first request is never cold.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  resources:
                    description: Pod resource requests/limits for the data-API container.
                    nullable: true
                    properties:
                      limits:
                        nullable: true
                        properties:
                          cpu:
                            nullable: true
                            type: string
                          memory:
                            nullable: true
                            type: string
                        type: object
                      requests:
                        nullable: true
                        properties:
                          cpu:
                            nullable: true
                            type: string
                          memory:
                            nullable: true
                            type: string
                        type: object
                    type: object
                  scope:
                    default: app
                    description: |-
                      `app` → one operator-managed data-API pod per `{org}/{app}`, serving all
                      of that app's domains via label selector. `domain` → one pod per
                      `{org}/{app}/{domain}`, watching only that namespace.
                    enum:
                    - app
                    - domain
                    type: string
                type: object
              displayName:
                type: string
              org:
                type: string
              owner:
                nullable: true
                type: string
              resourceQuotas:
                nullable: true
                properties:
                  maxApplications:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  maxFieldsPerSchema:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  maxRecordsPerSchema:
                    format: uint64
                    minimum: 0.0
                    nullable: true
                    type: integer
                  maxSchemas:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  maxStorageGb:
                    format: uint64
                    minimum: 0.0
                    nullable: true
                    type: integer
                  maxVersionsPerSchema:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  requestsPerSecond:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
              team:
                nullable: true
                type: string
            required:
            - displayName
            - org
            type: object
          status:
            nullable: true
            properties:
              conditions:
                default: []
                items:
                  description: Common condition shape reused in `*Status.conditions`.
                  properties:
                    lastTransitionTime:
                      nullable: true
                      type: string
                    message:
                      nullable: true
                      type: string
                    reason:
                      nullable: true
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              dataApiDeployment:
                description: |-
                  Name of the operator-managed app-scoped data-API Deployment, set when
                  an app-scoped data-API has been materialised.
                nullable: true
                type: string
              domains:
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              phase:
                description: Phase reported by an operator-managed resource.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deprecated
                - Rebuilding
                nullable: true
                type: string
              schemas:
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: Application
        type: object
    served: true
    storage: true
    subresources:
      status: {}
