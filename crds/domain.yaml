apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: domains.velocity.sh
spec:
  group: velocity.sh
  names:
    categories: []
    kind: Domain
    plural: domains
    shortNames:
    - dom
    singular: domain
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for DomainSpec via `CustomResource`
        properties:
          spec:
            properties:
              access:
                properties:
                  adminRole:
                    type: string
                  defaultRole:
                    type: string
                required:
                - adminRole
                - defaultRole
                type: object
              app:
                type: string
              databaseQuota:
                nullable: true
                properties:
                  coldTablespace:
                    description: Use cold-tier tablespace for the archive schema.
                    nullable: true
                    type: boolean
                  poolSize:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  readReplicas:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
              displayName:
                type: string
            required:
            - access
            - app
            - displayName
            type: object
          status:
            nullable: true
            properties:
              conditions:
                default: []
                items:
                  description: Common condition shape reused in `*Status.conditions`.
                  properties:
                    lastTransitionTime:
                      nullable: true
                      type: string
                    message:
                      nullable: true
                      type: string
                    reason:
                      nullable: true
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              pgRoles:
                default: []
                description: Postgres roles created for this domain.
                items:
                  type: string
                type: array
              pgSchema:
                description: Postgres schema this Domain provisioned, once Ready.
                nullable: true
                type: string
              phase:
                description: Phase reported by an operator-managed resource.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deprecated
                - Rebuilding
                nullable: true
                type: string
              schemas:
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: Domain
        type: object
    served: true
    storage: true
    subresources:
      status: {}
