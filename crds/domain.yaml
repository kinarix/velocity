apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: domains.velocity.sh
spec:
  group: velocity.sh
  names:
    categories: []
    kind: Domain
    plural: domains
    shortNames:
    - dom
    singular: domain
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for DomainSpec via `CustomResource`
        properties:
          spec:
            properties:
              access:
                properties:
                  adminRole:
                    type: string
                  defaultRole:
                    type: string
                required:
                - adminRole
                - defaultRole
                type: object
              app:
                type: string
              databaseQuota:
                nullable: true
                properties:
                  coldTablespace:
                    description: Use cold-tier tablespace for the archive schema.
                    nullable: true
                    type: boolean
                  poolSize:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  readReplicas:
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                type: object
              deployment:
                description: |-
                  ADR-011: data-API scope override for this domain.
                  Absent → inherits the Application's `spec.deployment.scope`, or `app`
                  if the Application also omits it.
                  `scope: domain` → the operator materialises a per-domain data-API
                  Deployment in this domain's namespace.
                nullable: true
                properties:
                  maxReplicas:
                    description: Maximum replicas (KEDA/HPA ceiling). Default 10.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  minReplicas:
                    description: |-
                      Minimum replicas (KEDA `minReplicaCount`). Default 1 — never
                      scale to zero, so a domain's first request is never cold.
                    format: uint32
                    minimum: 0.0
                    nullable: true
                    type: integer
                  resources:
                    description: Pod resource requests/limits for the data-API container.
                    nullable: true
                    properties:
                      limits:
                        nullable: true
                        properties:
                          cpu:
                            nullable: true
                            type: string
                          memory:
                            nullable: true
                            type: string
                        type: object
                      requests:
                        nullable: true
                        properties:
                          cpu:
                            nullable: true
                            type: string
                          memory:
                            nullable: true
                            type: string
                        type: object
                    type: object
                  scope:
                    default: app
                    description: |-
                      `app` → one operator-managed data-API pod per `{org}/{app}`, serving all
                      of that app's domains via label selector. `domain` → one pod per
                      `{org}/{app}/{domain}`, watching only that namespace.
                    enum:
                    - app
                    - domain
                    type: string
                type: object
              displayName:
                type: string
            required:
            - access
            - app
            - displayName
            type: object
          status:
            nullable: true
            properties:
              conditions:
                default: []
                items:
                  description: Common condition shape reused in `*Status.conditions`.
                  properties:
                    lastTransitionTime:
                      nullable: true
                      type: string
                    message:
                      nullable: true
                      type: string
                    reason:
                      nullable: true
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              dataApiDeployment:
                description: |-
                  Name of the operator-managed data-API Deployment, set when
                  `spec.deployment.scope == domain`. Absent when served by an app-scoped pod.
                nullable: true
                type: string
              pgRoles:
                default: []
                description: Postgres roles created for this domain.
                items:
                  type: string
                type: array
              pgSchema:
                description: Postgres schema this Domain provisioned, once Ready.
                nullable: true
                type: string
              phase:
                description: Phase reported by an operator-managed resource.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deprecated
                - Rebuilding
                nullable: true
                type: string
              schemas:
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: Domain
        type: object
    served: true
    storage: true
    subresources:
      status: {}
