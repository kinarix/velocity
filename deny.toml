# cargo-deny configuration — run via `cargo deny check`

[graph]
all-features = false

[advisories]
yanked  = "deny"
ignore  = []

[bans]
multiple-versions = "warn"
wildcards         = "deny"

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
]
confidence-threshold = 0.93

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
