services:
  postgres:
    image: postgres:18-alpine
    container_name: velocity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velocity
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - log_statement=ddl
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d velocity"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: velocity-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    # Official Apache image. Differs from the (retired) bitnami image:
    # env vars drop the `_CFG_` infix, CLUSTER_ID is required for KRaft,
    # log dir is /var/lib/kafka/data, and INTER_BROKER_LISTENER_NAME must
    # be explicit when multiple listeners are declared.
    image: apache/kafka:3.7.0
    container_name: velocity-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      # Fixed cluster ID so volume restarts don't trigger a re-format.
      # Base64 of a random UUID — opaque to Kafka, just must be stable.
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "9094:9092"
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: velocity-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER:     velocity
      MINIO_ROOT_PASSWORD: velocity_dev
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # console UI
    volumes:
      - ./data/minio:/data
    healthcheck:
      # The minio image ships neither curl nor wget — only bash + mc. Use
      # bash's /dev/tcp builtin to do a real HTTP GET against
      # /minio/health/live and assert a 200 status line. `read` + `[[ ]]`
      # are bash builtins, so we don't need head/grep (also absent).
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /minio/health/live HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && read -r line <&3 && [[ $$line == *'200 OK'* ]]"
      interval: 10s
      timeout: 5s
      retries: 10

  typesense:
    image: typesense/typesense:0.25.2
    container_name: velocity-typesense
    restart: unless-stopped
    environment:
      TYPESENSE_API_KEY: dev-typesense-key
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_ENABLE_CORS: "true"
    ports:
      - "8108:8108"
    volumes:
      - ./data/typesense:/data
    healthcheck:
      # The typesense:0.25.2 image ships no wget/curl/nc — only bash. Use
      # bash's /dev/tcp builtin to do a real HTTP GET against /health and
      # grep the body for `ok`. Keeps the probe behavioural (not just
      # "port is open") without adding tools to the image.
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/127.0.0.1/8108 && printf 'GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '\"ok\":true' <&3"
      interval: 10s
      timeout: 5s
      retries: 10
