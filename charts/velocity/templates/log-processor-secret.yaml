{{- if and .Values.logProcessor.enabled (eq (default "" .Values.logProcessor.existingSecret) "") -}}
{{- /*
  Render the bearer token Secret when no existingSecret is provided.
  If `logProcessor.ingestToken` is empty we generate a 32-char value at
  install time; subsequent upgrades reuse the existing Secret so the
  token doesn't churn on every `helm upgrade`.
*/ -}}
{{- $secretName := printf "%s-token" (include "velocity.logProcessor.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $token := "" -}}
{{- if .Values.logProcessor.ingestToken -}}
{{- $token = .Values.logProcessor.ingestToken -}}
{{- else if and $existing $existing.data $existing.data.token -}}
{{- $token = (index $existing.data .Values.logProcessor.ingestTokenKey) | b64dec -}}
{{- else -}}
{{- $token = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: log-processor
type: Opaque
stringData:
  {{ .Values.logProcessor.ingestTokenKey }}: {{ $token | quote }}
{{- end -}}
