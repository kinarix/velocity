{{- if .Values.portal.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "velocity.portal.fullname" . }}-config
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
data:
  # Served by nginx at /config.json. Read at portal boot by the SPA to
  # discover the default OIDC AuthStrategy + the central Grafana URL.
  # The values document is intentionally small — anything user-specific
  # belongs in the cluster's identity provider, not in this file.
  config.json: |
    {
      {{- with .Values.portal.config.defaultAuthStrategy }}
      "default_auth_strategy": {{ . | quote }},
      {{- end }}
      {{- with .Values.portal.config.grafanaUrl }}
      "grafana_url": {{ . | quote }},
      {{- end }}
      {{- with .Values.portal.config.environment }}
      "environment": {{ . | quote }},
      {{- end }}
      "_": null
    }
{{- end -}}
