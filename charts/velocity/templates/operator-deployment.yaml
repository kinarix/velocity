{{- if .Values.operator.enabled -}}
{{- $secretName := default (printf "%s-db" (include "velocity.operator.fullname" .)) .Values.operator.database.existingSecret -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "velocity.operator.fullname" . }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels:
      {{- include "velocity.operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "velocity.operator.selectorLabels" . | nindent 8 }}
      {{- with .Values.operator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "velocity.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.operator.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: {{ include "velocity.operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.operator.containerSecurityContext | nindent 12 }}
          env:
            - name: VELOCITY_OPERATOR_PG_HOST
              value: {{ default .Values.globalHost .Values.operator.database.host | quote }}
            - name: VELOCITY_OPERATOR_PG_PORT
              value: {{ .Values.operator.database.port | quote }}
            - name: VELOCITY_OPERATOR_PG_USER
              value: {{ .Values.operator.database.user | quote }}
            - name: VELOCITY_OPERATOR_PG_DB
              value: {{ .Values.operator.database.db | quote }}
            - name: VELOCITY_OPERATOR_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.operator.database.passwordKey }}
            - name: VELOCITY_OPERATOR_LEADER_ELECTION
              value: {{ .Values.operator.leaderElection.enabled | quote }}
            - name: VELOCITY_OPERATOR_NAMESPACE
              value: {{ default .Release.Namespace .Values.operator.leaderElection.namespace }}
            # The operator's own pod namespace — used as the target for
            # cluster-wide ConfigMaps it writes (SLO rules, log policy
            # bundle). Sourced from the downward API so a re-namespaced
            # release lands its artefacts in the right place without
            # rebuilding the binary.
            - name: VELOCITY_OPERATOR_SYSTEM_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: VELOCITY_OPERATOR_LOG_PRETTY
              value: {{ .Values.operator.logging.pretty | quote }}
            - name: RUST_LOG
              value: {{ printf "%s,velocity_operator=%s" .Values.operator.logging.level .Values.operator.logging.level | quote }}
            {{- with .Values.operator.dataApi }}
            {{- if .enabled }}
            # Phase 12a (ADR-011): enable the per-domain data-API workload
            # orchestrator. Disabled → dedicated Domains reconcile DB state but
            # spawn no Deployment (traffic stays on the shared default data-API).
            - name: VELOCITY_OPERATOR_DATA_API_IMAGE
              value: {{ include "velocity.dataApi.image" $ | quote }}
            {{- if .envSecret }}
            - name: VELOCITY_OPERATOR_DATA_API_ENV_SECRET
              value: {{ .envSecret | quote }}
            {{- end }}
            {{- if .envSourceSecret }}
            - name: VELOCITY_OPERATOR_DATA_API_ENV_SOURCE_SECRET
              value: {{ .envSourceSecret | quote }}
            {{- end }}
            {{- if .ingressHost }}
            - name: VELOCITY_OPERATOR_DATA_API_INGRESS_HOST
              value: {{ .ingressHost | quote }}
            {{- end }}
            {{- if eq (.authMode | default "enforced") "anonymous" }}
            - name: VELOCITY_OPERATOR_DATA_API_AUTH_MODE
              value: "anonymous"
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.operator.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.operator.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            # Single Axum server hosts /healthz, /readyz, and /metrics —
            # see crates/velocity-operator/src/health.rs. Default bind is
            # 0.0.0.0:8081 (VELOCITY_OPERATOR_HEALTH_ADDR overrides).
            - name: health
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            # /readyz flips to 200 once the first informer sync completes.
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end -}}
