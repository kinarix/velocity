{{- /*
  Credentials for the S3-compatible object store used by both
  warm-reader (read) and archive-worker (write). One Secret, shared.

  Dev (Minio) reads the values straight from objectStore.{accessKeyId,
  secretAccessKey} in values-dev.yaml. Prod sets
  `objectStore.existingSecret=…` and the values are ignored.
*/ -}}
{{- $needed := or .Values.warmReader.enabled .Values.archiveWorker.enabled -}}
{{- if and $needed (eq (default "" .Values.objectStore.existingSecret) "") -}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "velocity.fullname" . }}-object-store
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: object-store
stringData:
  access_key_id:     {{ .Values.objectStore.accessKeyId | quote }}
  secret_access_key: {{ .Values.objectStore.secretAccessKey | quote }}
{{- end -}}
