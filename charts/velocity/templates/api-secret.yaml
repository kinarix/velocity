{{- if and .Values.api.enabled (eq (default "" .Values.api.secrets.existingSecret) "") -}}
{{- /*
  Holds the API's CURSOR_SIGNING_KEY (≥32 bytes) and PLATFORM_AUDIT_TOKEN
  (≥16 chars). On first install we generate random values; subsequent
  upgrades reuse what's already in the cluster so tokens don't churn on
  every `helm upgrade`. Production should pass `--set api.secrets.existingSecret=…`
  pointing at a Secret managed by external-secrets-operator or sealed-secrets.
*/ -}}
{{- $secretName := printf "%s-secrets" (include "velocity.api.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $cursor := "" -}}
{{- $audit := "" -}}
{{- if and $existing $existing.data -}}
{{- $cursor = (index $existing.data "cursor_signing_key" | default "" | b64dec) -}}
{{- $audit = (index $existing.data "platform_audit_token" | default "" | b64dec) -}}
{{- end -}}
{{- if eq $cursor "" -}}
{{- $cursor = randAlphaNum 48 -}}
{{- end -}}
{{- if eq $audit "" -}}
{{- $audit = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  cursor_signing_key:   {{ $cursor | quote }}
  platform_audit_token: {{ $audit | quote }}
{{- end -}}
