{{- if and .Values.operator.enabled .Values.operator.dataApi.enabled -}}
{{- /*
  Phase 12a (ADR-011): source env Secret for operator-materialised per-domain
  data-API pods. The operator reads THIS Secret (in the release namespace) and
  projects a copy into each dedicated Domain's namespace, overriding
  VELOCITY_API_PG_USER / VELOCITY_API_PG_PASSWORD with the per-domain LOGIN
  role it mints. So this holds only the shared, non-per-domain env: the PG
  host/port/db, the cursor signing key, and optional Typesense / Redis.

  The cursor key is reused from the platform API's secret (via lookup) so all
  pods that could hand a cursor back within a domain agree on the HMAC key;
  on first install (api secret absent) a fresh key is generated and persisted.
*/ -}}
{{- $name := .Values.operator.dataApi.envSourceSecret -}}
{{- $apiSecretName := printf "%s-secrets" (include "velocity.api.fullname" .) -}}
{{- $existingApi := lookup "v1" "Secret" .Release.Namespace $apiSecretName -}}
{{- $existingSrc := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $cursor := "" -}}
{{- if and $existingApi $existingApi.data -}}
{{- $cursor = (index $existingApi.data "cursor_signing_key" | default "" | b64dec) -}}
{{- end -}}
{{- if and (eq $cursor "") $existingSrc $existingSrc.data -}}
{{- $cursor = (index $existingSrc.data "VELOCITY_API_CURSOR_SIGNING_KEY" | default "" | b64dec) -}}
{{- end -}}
{{- if eq $cursor "" -}}
{{- $cursor = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-api
type: Opaque
stringData:
  VELOCITY_API_PG_HOST: {{ default .Values.globalHost .Values.api.database.host | quote }}
  VELOCITY_API_PG_PORT: {{ .Values.api.database.port | quote }}
  VELOCITY_API_PG_DB:   {{ .Values.api.database.db | quote }}
  VELOCITY_API_CURSOR_SIGNING_KEY: {{ $cursor | quote }}
  {{- if .Values.api.redis.enabled }}
  VELOCITY_API_REDIS_URL: {{ printf "redis://%s:%v" (default .Values.globalHost .Values.api.redis.host) .Values.api.redis.port | quote }}
  {{- end }}
  {{- if .Values.api.typesense.enabled }}
  VELOCITY_API_TYPESENSE_URL: {{ printf "http://%s:%v" (default .Values.globalHost .Values.api.typesense.host) .Values.api.typesense.port | quote }}
  VELOCITY_API_TYPESENSE_API_KEY: {{ .Values.api.typesense.apiKey | quote }}
  {{- end }}
{{- end -}}
