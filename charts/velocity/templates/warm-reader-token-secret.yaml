{{- /*
  Service token for the API → warm-reader hop. Auto-generated on first
  install; reused on upgrades by reading the existing Secret so the token
  doesn't churn. Both the warm-reader (which authenticates inbound) and
  the API (which signs outbound) need to see the same value.

  In prod, set `warmReader.tokenSecret.existingSecret=…` and ditto
  `api.warmReader.existingSecret=…` to bind to an externally-managed
  Secret instead.
*/ -}}
{{- $needWR := and .Values.warmReader.enabled (eq (default "" .Values.warmReader.tokenSecret.existingSecret) "") -}}
{{- $needAPI := and .Values.api.enabled .Values.api.warmReader.enabled (eq (default "" .Values.api.warmReader.existingSecret) "") -}}
{{- if or $needWR $needAPI -}}
{{- $wrName := printf "%s-token" (include "velocity.warmReader.fullname" .) -}}
{{- $apiName := printf "%s-warm-reader" (include "velocity.api.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $wrName -}}
{{- $token := "" -}}
{{- if and $existing $existing.data -}}
{{- $token = (index $existing.data "service_token" | default "" | b64dec) -}}
{{- end -}}
{{- if eq $token "" -}}
{{- $token = randAlphaNum 48 -}}
{{- end -}}
{{- if $needWR }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $wrName }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: warm-reader
type: Opaque
stringData:
  service_token: {{ $token | quote }}
{{- end }}
{{- if $needAPI }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $apiName }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  service_token: {{ $token | quote }}
{{- end }}
{{- end -}}
