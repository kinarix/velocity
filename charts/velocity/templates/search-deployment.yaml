{{- if and .Values.api.enabled .Values.api.search.enabled -}}
{{- /*
  Phase 12a (ADR-011): the search tier — all Tier-3 search (per-schema,
  per-domain, cross-org) plus the CDC outbox→Typesense workers. Reachable under
  the `/search` ingress prefix. Holds Postgres (CDC + Tier-2 FTS fallback,
  ADR-003) and Typesense; no warm-reader, no admin, no platform audit token.
*/ -}}
{{- $dbSecret := default (printf "%s-db" (include "velocity.api.fullname" .)) .Values.api.database.existingSecret -}}
{{- $apiSecret := default (printf "%s-secrets" (include "velocity.api.fullname" .)) .Values.api.secrets.existingSecret -}}
{{- $tsSecret := default (printf "%s-typesense" (include "velocity.api.fullname" .)) .Values.api.typesense.existingSecret -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "velocity.search.fullname" . }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: search
spec:
  replicas: {{ .Values.api.search.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels:
      {{- include "velocity.search.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "velocity.search.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "velocity.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: search
          image: {{ include "velocity.search.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          env:
            - name: VELOCITY_API_PG_HOST
              value: {{ default .Values.globalHost .Values.api.database.host | quote }}
            - name: VELOCITY_API_PG_PORT
              value: {{ .Values.api.database.port | quote }}
            - name: VELOCITY_API_PG_USER
              value: {{ .Values.api.database.user | quote }}
            - name: VELOCITY_API_PG_DB
              value: {{ .Values.api.database.db | quote }}
            - name: VELOCITY_API_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: {{ .Values.api.database.passwordKey }}
            - name: VELOCITY_API_PG_POOL_MAX
              value: {{ .Values.api.database.poolMax | quote }}
            - name: VELOCITY_API_BIND_ADDR
              value: "0.0.0.0:8080"
            - name: VELOCITY_API_HEALTH_ADDR
              value: "0.0.0.0:8081"
            {{- if eq (.Values.api.auth).mode "anonymous" }}
            - name: VELOCITY_API_AUTH_MODE
              value: "anonymous"
            {{- end }}
            - name: VELOCITY_API_PRETTY_LOGS
              value: {{ .Values.api.logging.pretty | quote }}
            - name: RUST_LOG
              value: {{ printf "%s,velocity_core=%s,velocity_search=%s" .Values.api.logging.level .Values.api.logging.level .Values.api.logging.level | quote }}
            - name: VELOCITY_API_CURSOR_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $apiSecret }}
                  key: cursor_signing_key
            {{- if .Values.api.redis.enabled }}
            - name: VELOCITY_API_REDIS_URL
              value: {{ printf "redis://%s:%v" (default .Values.globalHost .Values.api.redis.host) .Values.api.redis.port | quote }}
            {{- end }}
            {{- if .Values.api.typesense.enabled }}
            - name: VELOCITY_API_TYPESENSE_URL
              value: {{ printf "http://%s:%v" (default .Values.globalHost .Values.api.typesense.host) .Values.api.typesense.port | quote }}
            - name: VELOCITY_API_TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $tsSecret }}
                  key: api_key
            {{- end }}
          ports:
            - { name: http,   containerPort: 8080, protocol: TCP }
            - { name: health, containerPort: 8081, protocol: TCP }
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "velocity.search.fullname" . }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: search
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "velocity.search.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
{{- end -}}
