{{- if .Values.portal.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "velocity.portal.fullname" . }}
  labels:
    {{- include "velocity.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
spec:
  replicas: {{ .Values.portal.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels:
      {{- include "velocity.portal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "velocity.portal.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pods when the config ConfigMap changes so the new
        # /config.json takes effect without a manual restart.
        checksum/config: {{ include (print $.Template.BasePath "/portal-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "velocity.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.portal.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: portal
          image: {{ include "velocity.portal.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.portal.containerSecurityContext | nindent 12 }}
          env:
            - name: VELOCITY_API_HOST
              value: {{ .Values.portal.apiHost | quote }}
            - name: LISTEN_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/velocity-portal
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "velocity.portal.fullname" . }}-config
{{- end -}}
