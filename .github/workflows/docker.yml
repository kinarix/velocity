name: docker

# Build and publish the seven server-side images (one per workspace
# binary that runs in-cluster) to ghcr.io/<owner>/<bin>.
#
# Architecture model:
#   - Each (bin, arch) pair builds on a NATIVE runner — ubuntu-latest for
#     amd64, ubuntu-24.04-arm for arm64. No QEMU. The arm64 build no
#     longer takes 6-10× longer than amd64; both finish in ~6-8 min.
#   - Each build pushes by *digest* only (no tags). The intermediate
#     manifests live untagged on ghcr.io and get GC'd eventually.
#   - The `merge` job per bin downloads all that bin's per-arch digests
#     and uses `docker buildx imagetools create` to stitch them into a
#     single multi-arch manifest with the final tags (:v1.2.3,
#     :<major>.<minor>, :latest). Pulling from an Apple Silicon or
#     Graviton host returns the arm64 manifest; from amd64 returns the
#     amd64 manifest — same UX as before, only the back-end changed.
#
# Trigger model:
#   - tag v<semver>          → publish :<semver>, :<major>.<minor>, :latest
#   - workflow_dispatch      → manual rebuild against the dispatch ref
#                              (typically main); same set of tags lands
#                              if the ref is a v* tag, otherwise the
#                              run is a build-only smoke test.
#
# Push-to-main does NOT trigger this workflow — ci.yml is the on-main
# regression gate. Building the 14 per-arch images on every merge cost
# more Actions minutes than the value of having :main + :sha-xxx tags
# floating on ghcr.io. Reversal of an earlier experiment.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

concurrency:
  # Serialise per-tag in case someone re-pushes the same tag mid-build
  # (`git push --force` over a v* tag during a release). cancel-in-
  # progress is OFF because tag builds are release events — we don't
  # want a re-push or workflow_dispatch to abandon a half-built release.
  group: docker-${{ github.ref }}
  cancel-in-progress: false

# sccache override (the ubuntu-latest runner preset breaks cargo
# invocations otherwise) — only meaningful for the `test` job, where
# cargo runs directly on the runner. The matrix build's cargo runs
# inside the Dockerfile, where these env vars don't propagate.
env:
  CARGO_TERM_COLOR:    always
  RUST_BACKTRACE:      "1"
  RUSTC_WRAPPER:       ""
  SCCACHE_GHA_ENABLED: "false"

jobs:
  # Tests gate the image builds. A regression that slips into main
  # shouldn't end up tagged :main or :latest on ghcr.io. Tag pushes are
  # guaranteed to be reachable from main, but the SHA could still be
  # one where tests are red.
  test:
    name: test
    runs-on: ubuntu-latest
    # Mirrors ci.yml's test job — keep both in sync by hand.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       velocity
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      VELOCITY_API_TEST_PG_URL:  postgres://postgres:postgres@localhost:5434/velocity
      VELOCITY_API_TEST_API_URL: postgres://velocity_api:velocity_api_dev@localhost:5434/velocity
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Bootstrap platform schema + roles
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in db/init/*.sql; do
            echo "==> applying $f"
            psql -v ON_ERROR_STOP=1 -h localhost -p 5434 -U postgres -d velocity -f "$f"
          done
          for f in migrations/*.sql; do
            echo "==> applying $f"
            psql -v ON_ERROR_STOP=1 -h localhost -p 5434 -U postgres -d velocity -f "$f"
          done

      # CARGO_TEST_ARGS=--locked makes `make test` pass --locked to
      # `cargo test`, replacing the separate `cargo build --workspace
      # --locked` gate. See the same step in ci.yml for the full
      # rationale.
      - run: make test CARGO_TEST_ARGS=--locked

  build:
    name: ${{ matrix.bin }} (${{ matrix.arch }})
    # Deliberately NOT `needs: test` — build runs in parallel with the
    # test job. The push here is push-by-digest only, so what lands on
    # ghcr.io is an *untagged* manifest. Nothing user-facing points at
    # it until `merge` stitches the manifest list with the final tags,
    # and `merge` does wait for tests. Net: we save the test wall-time
    # off the critical path when tests pass, and when tests fail the
    # only consequence is some orphan digests that ghcr.io GC's away.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        bin:
          - velocity-api
          - velocity-operator
          - velocity-webhook
          - velocity-archive-worker
          - velocity-log-collector
          - velocity-log-processor
          - velocity-warm-reader
        arch: [amd64, arm64]
        include:
          # Map arch → native runner. Public repos get ubuntu-24.04-arm
          # free (Apr 2025+). If the org disables hosted arm runners,
          # change `ubuntu-24.04-arm` here back to `ubuntu-latest` and
          # bring back `docker/setup-qemu-action` in the steps below —
          # everything else still works.
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure tag points to main
        # A v* tag pushed off a feature branch would otherwise still
        # fire this workflow. Reject anything not reachable from main.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin main --depth=200
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::tag ${GITHUB_REF} not reachable from main — refusing to publish"
            exit 1
          fi

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Owner (lowercase)
        id: owner
        # ghcr.io paths must be lowercase. github.repository_owner can
        # be mixed-case if the org/user uses CamelCase.
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Image labels
        id: meta
        # We only need labels here — tags are applied to the final
        # manifest in the merge job. Pulling the digest-only image by
        # its sha256 still gets these OCI labels.
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.bin }}
          labels: |
            org.opencontainers.image.title=${{ matrix.bin }}
            org.opencontainers.image.description=Velocity ${{ matrix.bin }}
            org.opencontainers.image.url=https://velocity.kinarix.com
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BIN=${{ matrix.bin }}
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          # `push-by-digest=true` pushes an untagged manifest and returns
          # its digest; `name-canonical=true` makes the image carry its
          # canonical name (matters for some registries' GC heuristics).
          # The merge job uses these digests to assemble the manifest list.
          outputs: type=image,name=ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.bin }},push-by-digest=true,name-canonical=true,push=true
          # GHA cache makes incremental builds tolerable. Scope per
          # (bin, arch) so the amd64 build doesn't poison the arm64
          # cache with foreign-arch object files.
          cache-from: type=gha,scope=${{ matrix.bin }}-${{ matrix.arch }}
          cache-to:   type=gha,scope=${{ matrix.bin }}-${{ matrix.arch }},mode=max
          provenance: false

      - name: Export digest
        # `docker buildx imagetools create` in the merge job needs the
        # sha256 of each per-arch manifest. Easiest cross-job channel
        # is the upload-artifact / download-artifact pair — we touch a
        # file whose name IS the digest and upload it.
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.bin }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: manifest (${{ matrix.bin }})
    # Both gates: per-arch digests must exist (build) AND tests must
    # have passed (test). This is the step that makes the build
    # publicly visible by attaching the :v1.2.3 / :latest / :main tags
    # to a manifest list — only do it once we've confirmed the SHA is
    # good.
    needs: [build, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bin:
          - velocity-api
          - velocity-operator
          - velocity-webhook
          - velocity-archive-worker
          - velocity-log-collector
          - velocity-log-processor
          - velocity-warm-reader
    steps:
      - name: Download per-arch digests
        uses: actions/download-artifact@v4
        with:
          # Both digests-<bin>-amd64 and digests-<bin>-arm64 land
          # together in $RUNNER_TEMP/digests/.
          pattern: digests-${{ matrix.bin }}-*
          merge-multiple: true
          path: ${{ runner.temp }}/digests

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Owner (lowercase)
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Image tags
        id: meta
        # All the final tags live on the manifest list, not the per-arch
        # images. metadata-action emits them as a JSON document on
        # DOCKER_METADATA_OUTPUT_JSON which the next step parses.
        #
        # Workflow only fires on v* tags now, so the tag patterns we
        # produce are :<X.Y.Z>, :<X.Y>, and :latest. The previous
        # branch/pr/sha patterns are dropped — they were reachable
        # only under the older "build on every main push" model.
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.bin }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        # `imagetools create` takes a set of source images (`repo@sha256:…`)
        # and produces a manifest list under one or more target tags.
        # jq maps each tag in $DOCKER_METADATA_OUTPUT_JSON to `-t <tag>`;
        # the source images are reconstructed by listing each digest
        # file name (which IS the sha256 sans prefix).
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.bin }}@sha256:%s ' *)

      - name: Inspect published manifest
        # Sanity-print the manifest list so a glance at the workflow log
        # confirms both arches landed. If only one digest arrived, the
        # imagetools create above would still succeed silently — this
        # step makes that visible.
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.bin }}:${{ steps.meta.outputs.version }}
