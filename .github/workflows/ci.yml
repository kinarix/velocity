name: ci

on:
  # Main-only by deliberate policy. PR/feature-branch runs would double
  # the Actions footprint without changing what ships — main is the
  # deploy branch, and `make release` from main is what triggers
  # downstream publish workflows. If we ever re-enable PR gating,
  # pair it with branch protection requiring this workflow to pass.
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # The ubuntu-latest runner image presets RUSTC_WRAPPER=sccache and
  # SCCACHE_GHA_ENABLED=true, but the sccache binary itself isn't on
  # PATH — so cargo immediately fails with "could not execute process
  # `sccache .../rustc -vV`". rust-cache already gives us workspace
  # caching, so just disable the wrapper. (If we ever want sccache
  # back, install it via mozilla-actions/sccache-action and remove
  # this override.)
  RUSTC_WRAPPER: ""
  SCCACHE_GHA_ENABLED: "false"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Belt-and-braces: build with --locked first so a drifted Cargo.lock
      # fails loudly before tests run. `make test` itself doesn't pass
      # --locked because local devs change Cargo.toml often and the lock
      # auto-updates on `cargo build`; CI is the one place that should
      # refuse to update it.
      - run: cargo build --workspace --locked
      # Run the same target devs run locally so "works on my machine" and
      # "works in CI" stay aligned. See `make test` in Makefile.
      - run: make test

  audit:
    name: audit
    runs-on: ubuntu-latest
    # rustsec/audit-check creates a "check run" against the commit so
    # findings show up inline in the GitHub UI. Default workflow token
    # is read-only since the 2023 security update; without checks:write
    # the action errors with "Resource not accessible by integration"
    # before reporting any findings.
    permissions:
      contents: read
      checks:   write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
