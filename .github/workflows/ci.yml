name: ci

on:
  # Main-only by deliberate policy. PR/feature-branch runs would double
  # the Actions footprint without changing what ships — main is the
  # deploy branch, and `make release` from main is what triggers
  # downstream publish workflows. If we ever re-enable PR gating,
  # pair it with branch protection requiring this workflow to pass.
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # The ubuntu-latest runner image presets RUSTC_WRAPPER=sccache and
  # SCCACHE_GHA_ENABLED=true, but the sccache binary itself isn't on
  # PATH — so cargo immediately fails with "could not execute process
  # `sccache .../rustc -vV`". rust-cache already gives us workspace
  # caching, so just disable the wrapper. (If we ever want sccache
  # back, install it via mozilla-actions/sccache-action and remove
  # this override.)
  RUSTC_WRAPPER: ""
  SCCACHE_GHA_ENABLED: "false"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    # Real Postgres so the ~18 integration tests in crates/velocity-api/tests
    # actually exercise RLS, audit chain, JSONB containment, time machine,
    # idempotency, etc. Without it they read the unset env var and silently
    # skip — green CI on unit tests alone, which is exactly what we don't
    # want for a DB-heavy platform.
    #
    # Port 5434 matches the Makefile's PG_PORT so the test defaults
    # (and any helper that hardcodes localhost:5434) work unchanged.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       velocity
        ports:
          - 5434:5432
        # Health check gates job start until pg_isready returns success
        # — saves us a manual `until` loop before the bootstrap step.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Tests pick these up via the test_support helpers. _PG_URL is the
      # superuser channel used to spin up per-test schemas; _API_URL is
      # the NOBYPASSRLS channel the test API server itself uses.
      VELOCITY_API_TEST_PG_URL:  postgres://postgres:postgres@localhost:5434/velocity
      VELOCITY_API_TEST_API_URL: postgres://velocity_api:velocity_api_dev@localhost:5434/velocity
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Bootstrap platform schema + roles
        # docker-compose's first-boot entrypoint applies db/init/*.sql and
        # the operator's reconciler applies migrations/*.sql in production.
        # Neither runs here, so we apply both up-front with psql against
        # the service container. PGPASSWORD avoids a libpq prompt.
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in db/init/*.sql; do
            echo "==> applying $f"
            psql -v ON_ERROR_STOP=1 -h localhost -p 5434 -U postgres -d velocity -f "$f"
          done
          for f in migrations/*.sql; do
            echo "==> applying $f"
            psql -v ON_ERROR_STOP=1 -h localhost -p 5434 -U postgres -d velocity -f "$f"
          done

      # CARGO_TEST_ARGS=--locked makes `make test` pass --locked to
      # `cargo test`, so a drifted Cargo.lock fails the test compile
      # loudly. Replaces the separate `cargo build --workspace --locked`
      # gate that used to live here — that step compiled ~10 binaries
      # in dev profile that nothing else consumed, ~1-2 min of wasted
      # work per run. The lock check is now implicit in the test compile.
      - run: make test CARGO_TEST_ARGS=--locked

  audit:
    name: audit
    runs-on: ubuntu-latest
    # rustsec/audit-check creates a "check run" against the commit so
    # findings show up inline in the GitHub UI. Default workflow token
    # is read-only since the 2023 security update; without checks:write
    # the action errors with "Resource not accessible by integration"
    # before reporting any findings.
    permissions:
      contents: read
      checks:   write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
