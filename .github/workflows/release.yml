name: release

# Triggers:
#   - push to main           → run the four-target CLI build matrix +
#                              the test job. Publish/formula skip. This
#                              catches cross-compile regressions (musl,
#                              macOS link, lld override, 20 MB size
#                              guard) at merge-time instead of at the
#                              next release.
#   - tag v<semver>          → same matrix runs, but publish + formula
#                              now also fire (gated on tests passing
#                              AND build succeeding).
#   - workflow_dispatch      → dry run from the Actions tab. Matrix +
#                              test run, publish/formula skip — same
#                              shape as a main push.
on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

permissions:
  contents: write  # creating the release + uploading assets, and the
                   # `formula` job below commits the updated homebrew/velocity.rb
                   # back to main using the workflow's GITHUB_TOKEN.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Forward into the build so `velocity version` reports the source
  # commit. Same env name the CLI reads in version_cmd.rs.
  VELOCITY_GIT_SHA: ${{ github.sha }}
  # The ubuntu-latest runner image presets RUSTC_WRAPPER=sccache and
  # SCCACHE_GHA_ENABLED=true, but sccache isn't on PATH — cargo fails
  # immediately with "could not execute process `sccache rustc -vV`".
  # Override at workflow level so every cargo invocation sees clean
  # values. (cross-compiled Linux jobs run cargo inside a `cross`
  # container which ignores these anyway; the override is harmless
  # there and necessary on the macOS jobs.)
  RUSTC_WRAPPER: ""
  SCCACHE_GHA_ENABLED: "false"
  # No CARGO_TARGET_*_APPLE_DARWIN_RUSTFLAGS overrides here. We tried
  # setting them to empty to defeat .cargo/config.toml's lld override
  # on CI macOS; in practice empty-string env values don't override
  # an array in [target.*-apple-darwin].rustflags — the config-file
  # rustflags still won, and the macOS build kept failing with
  # "invalid linker name". The current fix is the brew-install-lld
  # step on each macOS build job plus a native runner per target arch
  # so the absolute /opt/homebrew/bin vs /usr/local/bin path in the
  # config file resolves correctly.

jobs:
  # Tests gate publish (not build). Same pattern as docker.yml: build
  # runs in parallel with tests; only the actual artefact upload waits
  # for tests to pass. Mirrors ci.yml's test job exactly — keep the
  # three in sync by hand (a reusable workflow would deduplicate but
  # adds indirection).
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       velocity
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      VELOCITY_API_TEST_PG_URL:  postgres://postgres:postgres@localhost:5434/velocity
      VELOCITY_API_TEST_API_URL: postgres://velocity_api:velocity_api_dev@localhost:5434/velocity
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Bootstrap platform schema + roles
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in db/init/*.sql; do
            echo "==> applying $f"
            psql -v ON_ERROR_STOP=1 -h localhost -p 5434 -U postgres -d velocity -f "$f"
          done
          for f in migrations/*.sql; do
            echo "==> applying $f"
            psql -v ON_ERROR_STOP=1 -h localhost -p 5434 -U postgres -d velocity -f "$f"
          done

      # CARGO_TEST_ARGS=--locked makes `make test` pass --locked to
      # `cargo test`, replacing the separate `cargo build --workspace
      # --locked` gate. See the same step in ci.yml for the full
      # rationale.
      - run: make test CARGO_TEST_ARGS=--locked

  # One job per target triple. Linux uses musl so the binary is fully
  # static (no glibc surprises on older distros / Alpine). macOS uses
  # the default Apple system libraries — there's no "static libc" on
  # macOS, so we ship dynamically linked but with no third-party deps.
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # Native runner per target arch. macos-latest is Apple Silicon
          # (arm64); for x86_64 we use macos-13 (Intel) so the compile is
          # native instead of cross-compiling rustc/clang outputs from
          # arm64 to x86_64. macos-13 will be deprecated eventually —
          # when GitHub drops it, this entry becomes either macos-15 (if
          # still Intel) or moves back to a single macos-latest with the
          # cross-compile re-enabled. The `os` is the lever; everything
          # else in the step list stays identical.
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so the on-main guard can resolve merge-base.
          fetch-depth: 0

      - name: Ensure tag points to main
        # A v* tag pushed off a feature branch must not publish a
        # release. Tags created via `make release` are guaranteed to be
        # on main; this is the belt-and-braces backstop.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin main --depth=200
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::tag ${GITHUB_REF} not reachable from main — refusing to release"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # `cross` for musl targets gives us the right linker + libc
      # without setting up cross-compilers manually.
      - name: install cross
        if: matrix.cross
        run: cargo install cross --locked

      # .cargo/config.toml's [target.*-apple-darwin] rustflags point at
      # absolute Homebrew paths to ld64.lld (/opt/homebrew/bin on Apple
      # Silicon runners, /usr/local/bin on Intel). The path matches the
      # native runner per matrix entry — so installing lld here makes
      # the existing config work without any env-var trickery.
      #
      # Costs ~30-60 s per macOS job. We pay that to keep dev and CI
      # using the same linker; tracked in [punch-list-item-1] as the
      # decided fix after the empty-rustflags override approach turned
      # out not to override an array in the config file.
      - name: install lld (macOS only)
        if: runner.os == 'macOS'
        run: brew install lld

      - name: build (release)
        env:
          # Tells the workspace's binaries to bake the commit into
          # `option_env!("VELOCITY_GIT_SHA")`. See version_cmd.rs.
          VELOCITY_GIT_SHA: ${{ github.sha }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p velocity-cli --locked
          else
            cargo build --release --target ${{ matrix.target }} -p velocity-cli --locked
          fi

      - name: smoke (--version)
        # On Linux this requires Docker (the cross image); skip and
        # rely on the build itself to fail loud. On macOS, run it.
        if: matrix.cross == false
        run: |
          ./target/${{ matrix.target }}/release/velocity --version
          ./target/${{ matrix.target }}/release/velocity --help > /dev/null

      - name: size guard
        # CLAUDE.md / phases.md says < 20 MB. Fail the release if the
        # stripped binary exceeds it — a regression is worth catching
        # before publishing.
        run: |
          bin=./target/${{ matrix.target }}/release/velocity
          # macOS strip is built in; Linux musl already has none.
          if [ "${{ runner.os }}" = "macOS" ]; then strip "$bin"; fi
          size=$(stat -c%s "$bin" 2>/dev/null || stat -f%z "$bin")
          echo "binary size: $size bytes"
          if [ "$size" -gt 20971520 ]; then
            echo "::error::velocity binary exceeds 20 MB ($size bytes)"
            exit 1
          fi

      - name: package
        id: pkg
        run: |
          name="velocity-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp target/${{ matrix.target }}/release/velocity "dist/$name/"
          cp README.md LICENSE 2>/dev/null "dist/$name/" || true
          (cd dist && tar -czf "$name.tar.gz" "$name")
          sha256sum "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256" \
            || shasum -a 256 "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256"
          echo "archive=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/$name.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: velocity-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.checksum }}

  publish:
    name: publish release
    # Gate on both test and build. Build only verifies the four targets
    # compile + smoke-test + fit under the size cap; test is what proves
    # the workspace is shippable. Either failing skips publish.
    needs: [build, test]
    # Two-part guard: must be a push event (no manual dry runs), AND
    # the ref must be a v<semver> tag. Before the on-main-push trigger
    # was added this was just `github.event_name == 'push'`; we now
    # need the tag check too or every main merge would publish.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256

  formula:
    name: update homebrew formula
    needs: publish
    # Inherits the tag gate transitively via `needs: publish`, but we
    # set it explicitly here too — defense in depth against someone
    # removing the dependency edge later. Same shape as the publish
    # job's guard.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the commit lands cleanly on main.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract checksums
        id: sums
        # Each .sha256 file is "<hex>  <archive>"; we want the hex only.
        # Pin the four targets the formula references so a missing
        # artifact fails loudly instead of silently leaving zeros in
        # place.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##*/}"             # vX.Y.Z
          ver="${tag#v}"                       # X.Y.Z
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          for target in \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            aarch64-unknown-linux-musl \
            x86_64-unknown-linux-musl; do
            f="dist/velocity-${tag}-${target}.tar.gz.sha256"
            if [ ! -f "$f" ]; then
              echo "::error::missing checksum file $f"
              exit 1
            fi
            sum="$(awk '{print $1}' "$f")"
            key="$(echo "$target" | tr '-' '_')"   # awk-safe key
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - name: Rewrite homebrew/velocity.rb
        env:
          VER:            ${{ steps.sums.outputs.version }}
          SHA_DARWIN_ARM: ${{ steps.sums.outputs.aarch64_apple_darwin }}
          SHA_DARWIN_X64: ${{ steps.sums.outputs.x86_64_apple_darwin }}
          SHA_LINUX_ARM:  ${{ steps.sums.outputs.aarch64_unknown_linux_musl }}
          SHA_LINUX_X64:  ${{ steps.sums.outputs.x86_64_unknown_linux_musl }}
        # A targeted python rewrite is more reliable than nested sed
        # patterns — the formula has four sha256 lines that the macOS
        # arm / macOS x64 / linux arm / linux x64 branches each own. We
        # walk the file line-by-line tracking which `on_*` + `if/else`
        # block we're inside, then replace exactly one sha256 per block.
        run: |
          python3 <<'PY'
          import os, re, pathlib
          p = pathlib.Path("homebrew/velocity.rb")
          src = p.read_text().splitlines(keepends=True)
          ver   = os.environ["VER"]
          sums = {
              ("macos", "arm"): os.environ["SHA_DARWIN_ARM"],
              ("macos", "x64"): os.environ["SHA_DARWIN_X64"],
              ("linux", "arm"): os.environ["SHA_LINUX_ARM"],
              ("linux", "x64"): os.environ["SHA_LINUX_X64"],
          }
          os_ctx, arch_ctx = None, None
          out = []
          for line in src:
              s = line.lstrip()
              if s.startswith("on_macos"):
                  os_ctx, arch_ctx = "macos", None
              elif s.startswith("on_linux"):
                  os_ctx, arch_ctx = "linux", None
              elif "Hardware::CPU.arm?" in s:
                  arch_ctx = "arm"
              elif s.startswith("else") and os_ctx and arch_ctx == "arm":
                  arch_ctx = "x64"
              elif s.startswith("end") and arch_ctx is not None:
                  arch_ctx = None
              elif s.startswith("end") and os_ctx is not None and arch_ctx is None:
                  os_ctx = None

              # Version line — single occurrence at the top of the class.
              if re.match(r'^\s*version\s+"', line):
                  line = re.sub(r'"[^"]*"', f'"{ver}"', line, count=1)

              # sha256 line — pick the value for the (os_ctx, arch_ctx) we're in.
              if re.match(r'^\s*sha256\s+"', line) and (os_ctx, arch_ctx) in sums:
                  line = re.sub(r'"[0-9a-fA-F]+"', f'"{sums[(os_ctx, arch_ctx)]}"', line, count=1)

              out.append(line)
          p.write_text("".join(out))
          print(f"rewrote homebrew/velocity.rb for version {ver}")
          PY

      - name: Commit + push formula update
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Land the commit on main, not on the detached tag ref.
          git checkout main
          # The `set -u` above will have killed us already if Python
          # didn't write — defensive check anyway.
          if git diff --quiet homebrew/velocity.rb; then
            echo "==> formula already up to date (re-run?)"
            exit 0
          fi
          git add homebrew/velocity.rb
          git commit -m "chore(formula): velocity v${{ steps.sums.outputs.version }}" \
                     -m "Auto-updated by release.yml from tag ${GITHUB_REF##*/}."
          git push origin main
